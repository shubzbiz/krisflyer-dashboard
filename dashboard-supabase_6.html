<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrisFlyer Miles Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45; --border2:#253550;
    --accent:#0ea5e9; --accent2:#38bdf8; --gold:#f59e0b; --gold2:#fbbf24;
    --green:#10b981; --red:#ef4444; --orange:#f97316;
    --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}

  /* NAV */
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .nav-brand{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent2);letter-spacing:-.3px;}
  .nav-brand span{color:var(--text3);font-weight:400;}
  .nav-tabs{display:flex;gap:4px;}
  .nav-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;transition:all .15s;}
  .nav-tab:hover{color:var(--text);background:var(--surface2);}
  .nav-tab.active{color:var(--accent2);background:rgba(14,165,233,.12);}
  .nav-right{display:flex;gap:8px;align-items:center;}

  /* PERSON SWITCHER */
  .person-switcher{display:flex;align-items:center;gap:0;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
  .person-btn{padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:var(--sans);white-space:nowrap;}
  .person-btn:hover{color:var(--text);background:var(--surface2);}
  .person-btn.p0.active{background:var(--accent2);color:#0b0f1a;}
  .person-btn.p1.active{background:#a78bfa;color:#0b0f1a;}
  .person-btn.p2.active{background:#34d399;color:#0b0f1a;}
  .person-btn.p3.active{background:#fb923c;color:#0b0f1a;}
  .person-divider{width:1px;height:24px;background:var(--border2);}
  .person-edit-btn{padding:5px 8px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:var(--sans);}
  .person-edit-btn:hover{color:var(--text);}
  .person-btn.all-active{background:var(--surface2);color:var(--text);font-weight:700;}
  .person-add-btn{padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:var(--sans);}
  .person-add-btn:hover{color:var(--accent2);}

  /* PERSON COLOR VARS */
  .pc-0{color:var(--accent2)!important;}
  .pc-1{color:#a78bfa!important;}
  .pc-2{color:#34d399!important;}
  .pc-3{color:#fb923c!important;}
  .pb-0{background:var(--accent2);}
  .pb-1{background:#a78bfa;}
  .pb-2{background:#34d399;}
  .pb-3{background:#fb923c;}

  /* BUTTONS */
  .btn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--sans);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent2);}
  .btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
  .btn-ghost:hover{color:var(--text);}
  .btn-sm{padding:4px 10px;font-size:12px;}
  .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .btn-danger:hover{background:rgba(239,68,68,.25);}
  .btn-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
  .btn-success:hover{background:rgba(16,185,129,.25);}

  /* LAYOUT */
  .main{max-width:1440px;margin:0 auto;padding:24px;}

  /* PERSON SECTION WRAPPER */
  .person-section{margin-bottom:40px;}
  .person-section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .person-name-badge{font-size:16px;font-weight:700;letter-spacing:-.2px;}
  .person-section-divider{height:2px;background:linear-gradient(90deg,rgba(14,165,233,.4),transparent);border-radius:2px;flex:1;}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .stat-card.blue::before{background:linear-gradient(90deg,var(--accent),transparent);}
  .stat-card.red::before{background:linear-gradient(90deg,var(--red),transparent);}
  .stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}
  .stat-card.purple::before{background:linear-gradient(90deg,#a78bfa,transparent);}
  .stat-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}
  .stat-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;}
  .stat-value.blue{color:var(--accent2);}
  .stat-value.red{color:var(--red);}
  .stat-value.green{color:var(--green);}
  .stat-value.purple{color:#a78bfa;}
  .stat-value.gold{color:var(--gold2);}
  .stat-sub{font-size:12px;color:var(--text3);margin-top:5px;}

  /* SECTION HEADER */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:7px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

  /* FILTERS */
  .filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filter-label{font-size:12px;color:var(--text3);}
  select,input[type="text"],input[type="number"],input[type="date"],input[type="month"]{
    background:var(--surface2);border:1px solid var(--border2);border-radius:6px;
    color:var(--text);padding:6px 10px;font-size:13px;font-family:var(--sans);outline:none;transition:border .15s;}
  select:focus,input:focus{border-color:var(--accent);}
  select option{background:var(--surface2);}

  /* TABLE BASE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
  table{width:100%;border-collapse:collapse;}
  thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
  th{padding:9px 13px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;}
  td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(255,255,255,.02);}
  .mono{font-family:var(--mono);}

  /* BANK-GROUPED TABLE */
  .bank-group{margin-bottom:18px;}
  .bank-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px 10px 0 0;cursor:pointer;user-select:none;}
  .bank-header.closed{border-radius:10px;}
  .bank-header:hover{background:#1e2a3e;}
  .bank-header-left{display:flex;align-items:center;gap:11px;}
  .bank-pill{font-size:12px;font-weight:700;letter-spacing:.4px;padding:3px 11px;border-radius:20px;font-family:var(--mono);}
  .bp-uob{background:rgba(220,38,38,.18);color:#f87171;border:1px solid rgba(220,38,38,.3);}
  .bp-dbs{background:rgba(220,38,38,.18);color:#f87171;border:1px solid rgba(220,38,38,.3);}
  .bp-citi{background:rgba(59,130,246,.18);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
  .bp-hsbc{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}
  .bp-ocbc{background:rgba(249,115,22,.18);color:#fdba74;border:1px solid rgba(249,115,22,.3);}
  .bp-amex{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);}
  .bp-scb{background:rgba(139,92,246,.18);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);}
  .bp-maybank{background:rgba(234,179,8,.18);color:#fde047;border:1px solid rgba(234,179,8,.3);}
  .bp-other{background:rgba(100,116,139,.2);color:var(--text2);border:1px solid var(--border2);}

  .bank-summary{display:flex;align-items:center;gap:22px;}
  .bank-stat{text-align:right;}
  .bank-stat-val{font-family:var(--mono);font-size:13px;font-weight:600;}
  .bank-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
  .chevron{color:var(--text3);font-size:10px;margin-left:6px;transition:transform .2s;display:inline-block;}
  .chevron.open{transform:rotate(180deg);}

  .bank-body{border:1px solid var(--border2);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}

  /* POOL ROW */
  .pool-row td{background:rgba(14,165,233,.04);border-bottom:1px solid var(--border);}
  .pool-row td:first-child{padding-left:16px;}
  .pool-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}

  /* CARD SUB-ROWS */
  .card-row td:first-child{padding-left:32px;}
  .card-row td{background:transparent;}
  .card-indent{display:flex;align-items:center;gap:6px;}
  .card-indent::before{content:'';width:12px;height:1px;background:var(--border2);flex-shrink:0;}

  .bank-add-row{padding:9px 13px;border-top:1px solid var(--border);background:rgba(255,255,255,.01);}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;}
  .b-blue{background:rgba(14,165,233,.15);color:var(--accent2);}
  .b-gold{background:rgba(245,158,11,.15);color:var(--gold2);}
  .b-green{background:rgba(16,185,129,.15);color:var(--green);}
  .b-red{background:rgba(239,68,68,.15);color:var(--red);}
  .b-orange{background:rgba(249,115,22,.15);color:var(--orange);}
  .b-gray{background:rgba(100,116,139,.2);color:var(--text3);}
  .b-purple{background:rgba(167,139,250,.15);color:#a78bfa;}

  /* PROGRESS BAR */
  .prog{width:100%;background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;}
  .prog-bar{height:100%;border-radius:3px;}

  /* ALERTS */
  .alerts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .alert-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .alert-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
  .alert-item:last-child{border-bottom:none;padding-bottom:0;}
  .alert-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .ai-warn{background:rgba(249,115,22,.15);}
  .ai-danger{background:rgba(239,68,68,.15);}
  .ai-info{background:rgba(14,165,233,.12);}
  .alert-title{font-size:13px;font-weight:500;}
  .alert-sub{font-size:11px;color:var(--text3);margin-top:2px;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:26px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:18px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .fg-full{grid-column:1/-1;}
  .form-group label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
  .form-group input,.form-group select{width:100%;}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

  /* INLINE EDIT */
  .inline-edit{border:1px solid transparent;background:transparent;color:var(--text);border-radius:4px;padding:2px 6px;width:100px;font-family:var(--mono);font-size:13px;}
  .inline-edit:focus{border-color:var(--accent);background:var(--surface2);outline:none;}

  /* TAB CONTENT */
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* EMPTY STATE */
  .empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
  .empty .icon{font-size:28px;margin-bottom:6px;}

  /* FEE COUNTDOWN */
  .fee-countdown{font-family:var(--mono);font-size:12px;}
  .fc-soon{color:var(--red);}
  .fc-mid{color:var(--orange);}
  .fc-ok{color:var(--text3);}

  /* FEE TICKER */
  .fee-ticker-wrap{overflow:hidden;position:relative;height:18px;margin-top:6px;}
  .fee-ticker{display:flex;gap:0;white-space:nowrap;animation:ticker-scroll 18s linear infinite;}
  .fee-ticker:hover{animation-play-state:paused;}
  .fee-ticker-item{display:inline-flex;align-items:center;gap:5px;padding:0 14px;font-size:11px;font-family:var(--mono);}
  .fee-ticker-item.urgent{color:var(--red);}
  .fee-ticker-item.mid{color:var(--orange);}
  .fee-ticker-item.ok{color:var(--text3);}
  .fee-ticker-sep{color:var(--border2);padding:0 2px;}
  @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  /* MILES BUBBLE */
  .miles-bubble{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(14,165,233,.18),rgba(56,189,248,.08));border:1px solid rgba(14,165,233,.35);border-radius:12px;padding:6px 14px;min-width:120px;}
  .miles-bubble-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent2);line-height:1.1;}
  .miles-bubble-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:2px;}
  .miles-bubble-sub{font-size:10px;color:var(--text3);margin-top:1px;}
  .bp-krisflyer{background:rgba(14,165,233,.2);color:var(--accent2);border:1px solid rgba(14,165,233,.4);}
  .kf-row td{background:rgba(14,165,233,.05);}

  /* CONVERSION RATIO BADGE */
  .ratio-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:11px;color:var(--accent2);}
  .ratio-badge .ratio-arrow{color:var(--text3);font-size:10px;}

  /* PERSON SECTION SEPARATOR */
  .person-sep{margin:32px 0;border:none;border-top:2px dashed var(--border);opacity:.5;}

  /* RESPONSIVE */
  @media(max-width:900px){
    .stats-grid{grid-template-columns:1fr 1fr;}
    .alerts-grid{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
    .nav-tabs{display:none;}
    .bank-summary{gap:12px;}
  }
  @media(max-width:600px){
    .stats-grid{grid-template-columns:1fr;}
    .main{padding:12px;}
    .person-switcher{display:none;}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">✈ KrisFlyer Tracker <span>/ SG</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('overview')">Overview</button>
    <button class="nav-tab" onclick="showTab('cards')">Cards</button>
    <button class="nav-tab" onclick="showTab('update')">Monthly Update</button>
    <button class="nav-tab" onclick="showTab('expiry')">⏰ Points Expiry</button>
    <button class="nav-tab" onclick="showTab('reminders')">Reminders</button>
    <button class="nav-tab" onclick="showTab('plan')">✈ Plan Trip</button>
  </div>
  <div class="nav-right">
    <div class="person-switcher" id="person-switcher"></div>
    <div style="position:relative;display:inline-block">
      <button class="btn btn-ghost btn-sm" onclick="toggleExportMenu()">Export ▾</button>
      <div id="export-menu" style="display:none;position:absolute;right:0;top:34px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;z-index:150;min-width:175px;box-shadow:0 4px 20px rgba(0,0,0,.4)">
        <button onclick="exportData();toggleExportMenu()" style="display:block;width:100%;padding:10px 14px;text-align:left;font-size:13px;color:var(--text);background:none;border:none;cursor:pointer;font-family:var(--sans)" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">📋 Current Balances</button>
        <button onclick="exportHistory();toggleExportMenu()" style="display:block;width:100%;padding:10px 14px;text-align:left;font-size:13px;color:var(--text);background:none;border:none;cursor:pointer;font-family:var(--sans)" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">📅 Full History (all months)</button>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddCard()">+ Add Card</button>
  </div>
</nav>

<div class="main" id="main-content"></div>

<!-- MODAL: ADD/EDIT CARD -->
<div class="modal-overlay" id="card-modal">
  <div class="modal">
    <h2 id="modal-title">Add Credit Card</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Bank *</label>
        <input type="text" id="f-bank" list="bank-list" placeholder="UOB, DBS, Citibank…">
        <datalist id="bank-list">
          <option>UOB</option><option>DBS</option><option>Citibank</option><option>HSBC</option>
          <option>OCBC</option><option>Amex</option><option>SCB</option><option>Maybank</option>
        </datalist>
      </div>
      <div class="form-group">
        <label>Card Name *</label>
        <input type="text" id="f-name" placeholder="e.g. PRVI Miles Visa">
      </div>
      <div class="form-group">
        <label>Points Balance</label>
        <input type="number" id="f-points" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>KF Conversion Ratio (pts per mile)</label>
        <input type="number" id="f-ratio" placeholder="e.g. 3" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label>Pool Group Name (if points are pooled)</label>
        <input type="text" id="f-pool" placeholder="e.g. UOB Points Pool">
      </div>
      <div class="form-group">
        <label>Points Validity</label>
        <input type="text" id="f-validity" placeholder="e.g. 3 years, No expiry">
      </div>
      <div class="form-group">
        <label>Points Expiry Date</label>
        <input type="date" id="f-expiry">
      </div>
      <div class="form-group">
        <label>Annual Fee Month</label>
        <select id="f-feemonth">
          <option value="">— no annual fee —</option>
          <option>January</option><option>February</option><option>March</option>
          <option>April</option><option>May</option><option>June</option>
          <option>July</option><option>August</option><option>September</option>
          <option>October</option><option>November</option><option>December</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Owner</label>
        <select id="f-owner"></select>
      </div>
      <div class="form-group fg-full">
        <label>Notes (waiver conditions, bonus categories…)</label>
        <input type="text" id="f-notes" placeholder="">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: MANAGE PEOPLE -->
<div class="modal-overlay" id="person-modal">
  <div class="modal" style="width:420px">
    <h2>Manage People</h2>
    <div id="person-list-edit" style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px"></div>
    <button class="btn btn-ghost btn-sm" onclick="addPersonField()" style="width:100%">+ Add Person</button>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePersonModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePersonNames()">Save</button>
    </div>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- MODAL: ADD EXPIRY BATCH -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal" style="width:460px">
    <h2>Add Points Expiry Batch</h2>

function uid(){ return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmtDate(d){ return d.toISOString().split('T')[0]; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function personColor(pi){ return PERSON_COLORS[pi%PERSON_COLORS.length]; }

function getMiles(card){
  if(!card.ratio||card.ratio<=0) return 0;
  return Math.floor(card.points*card.ratio);
}
function getExpiryDays(card){
  if(!card.expiry) return null;
  return Math.ceil((new Date(card.expiry)-new Date())/86400000);
}
function getFeeCountdown(card){
  if(!card.feemonth) return null;
  const today=new Date(), yr=today.getFullYear(), mi=MONTHS.indexOf(card.feemonth);
  if(mi<0) return null;
  let fd=new Date(yr,mi,1);
  if(fd<=today) fd=new Date(yr+1,mi,1);
  return Math.ceil((fd-today)/86400000);
}
function feeCountdownHtml(card){
  const d=getFeeCountdown(card);
  if(d===null) return '<span style="color:var(--text3)">—</span>';
  const cls=d<=30?'fc-soon':d<=90?'fc-mid':'fc-ok';
  return `<div class="fee-countdown ${cls}" style="font-weight:600">${card.feemonth.slice(0,3)}</div><div class="fee-countdown ${cls}" style="font-size:10px">${d}d away</div>`;
}
function ratioBadge(ratio){
  if(!ratio) return '<span style="color:var(--text3)">—</span>';
  return `<span class="ratio-badge">${ratio}<span class="ratio-arrow">→</span>1</span>`;
}
function bankPillClass(b){
  const k=b.toLowerCase();
  if(k==='uob') return 'bp-uob';
  if(k==='dbs') return 'bp-dbs';
  if(k.includes('citi')) return 'bp-citi';
  if(k==='hsbc') return 'bp-hsbc';
  if(k==='ocbc') return 'bp-ocbc';
  if(k==='amex') return 'bp-amex';
  if(k==='scb'||k.includes('standard')) return 'bp-scb';
  if(k==='maybank') return 'bp-maybank';
  if(k.includes('max')) return 'bp-amex';
  if(k.includes('kris')) return 'bp-krisflyer';
  return 'bp-other';
}
function cardsFor(pi){ return allCards.filter(c=>c.owner===pi&&c.status==='active'); }

function removePersonField(i){
  if(persons.length<=1){alert('Need at least one person.');return;}
  const hasCards=allCards.some(c=>c.owner===i);
  if(hasCards){
    if(!confirm(`${persons[i]} has cards. Remove them from this person (they won't be deleted, just re-assigned to ${persons[0]})?`)) return;
    allCards.forEach(c=>{ if(c.owner===i) c.owner=0; if(c.owner>i) c.owner--; });
  } else {
    allCards.forEach(c=>{ if(c.owner>i) c.owner--; });
  }
  persons.splice(i,1);
  openPersonModal();
}

function buildOverviewSection(pi){

  const cards=cardsFor(pi);
  const pColor=personColor(pi);

  const CONVERTED_BANKS=['KrisFlyer','Max Miles'];

  const pointCards=cards.filter(c=>!CONVERTED_BANKS.includes(c.bank)&&!c.isKF);

  const convertedCards=cards.filter(c=>CONVERTED_BANKS.includes(c.bank)||c.isKF);

  // Estimated miles from card points (points × ratio, rounded)
  const cardMiles=pointCards.reduce((s,c)=>s+getMiles(c),0);
  // Already-converted miles sitting ready to use
  const convertedMiles=convertedCards.reduce((s,c)=>s+c.points,0);
  const totalMiles=Math.floor(cardMiles+convertedMiles);

  const expiring=pointCards.filter(c=>{const d=getExpiryDays(c);return d!==null&&d<=90&&d>=0;});
  const feesSoon=cards.filter(c=>{const d=getFeeCountdown(c);return d!==null&&d<=90;});

      </div>
    </div>

      <div class="stat-card red">
        <div class="stat-label">Points Expiring ≤ 90 days</div>
        <div class="stat-value red">${(()=>{
          const cutoff=new Date(); cutoff.setDate(cutoff.getDate()+90);
          return allBatches.filter(b=>b.owner===pi&&new Date(b.expiryDate)<=cutoff).reduce((s,b)=>s+b.points,0).toLocaleString();
        })()}</div>
        <div class="stat-sub">${(()=>{
          const cutoff=new Date(); cutoff.setDate(cutoff.getDate()+90);
          const batches=allBatches.filter(b=>b.owner===pi&&new Date(b.expiryDate)<=cutoff);
          return batches.length?`${batches.length} batch${batches.length!==1?'es':''} · ${[...new Set(batches.map(b=>b.cardName))].join(', ')}`:'No batches expiring soon';
        })()}</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Annual Fees — Next 3 Months</div>
        <div class="stat-value gold">${feesSoon.length}</div>
        ${feesSoon.length ? `<div class="fee-ticker-wrap">
          <div class="fee-ticker">
            ${[...feesSoon,...feesSoon].map(c=>{
              const fd=getFeeCountdown(c);
              const cls=fd<=31?'urgent':fd<=62?'mid':'ok';
              const flag=fd<=31?'🔴':'📅';
              return `<span class="fee-ticker-item ${cls}">${flag} ${c.bank} ${c.name} · ${c.feemonth}<span class="fee-ticker-sep">  ·  </span></span>`;
            }).join('')}

function buildExpiryTable(pi){
  const batches=allBatches
    .filter(b=>b.owner===pi)
    .sort((a,b)=>new Date(a.expiryDate)-new Date(b.expiryDate));

  if(!batches.length) return `
    <div class="table-wrap" style="margin-bottom:20px">
      <div class="empty" style="padding:24px">
        <div class="icon">⏰</div>

        <div style="margin-top:6px"><a onclick="showTab('expiry')" style="color:var(--accent2);cursor:pointer;font-size:12px">→ Go to Points Expiry tab to add batches</a></div>
      </div>
    </div>`;

  return `<div class="table-wrap" style="margin-bottom:20px"><table><thead><tr>
    <th>Bank</th><th>Card</th><th>Batch Points</th><th>Ratio</th><th>Est. Miles</th><th>Expiry Date</th><th>Days Left</th><th>Status</th>
  </tr></thead><tbody>${batches.map(b=>{
    const card=allCards.find(c=>c.id===b.cardId);
    const ratio=card?card.ratio:1;
    const isKF=card&&(card.bank==='KrisFlyer'||card.isKF);
    const miles=Math.floor(b.points*ratio);
    const d=Math.ceil((new Date(b.expiryDate)-new Date())/86400000);
    const bc=d<=30?'b-red':d<=90?'b-orange':d<=180?'b-gold':'b-gray';
    const label=d<=30?'Critical':d<=90?'Soon':d<=180?'Watch':'OK';
    return `<tr>
      <td><span class="badge ${bankPillClass(b.bank)}">${b.bank}</span></td>
      <td><strong>${b.cardName}</strong></td>
      <td class="mono">${b.points.toLocaleString()} ${isKF?'mi':'pts'}</td>

function buildFeeAlerts(pi){
  const today=new Date();
  const nextMonthStart=new Date(today.getFullYear(), today.getMonth()+1, 1);
  const nextMonthEnd=new Date(today.getFullYear(), today.getMonth()+2, 0);

  const rows=cardsFor(pi).filter(c=>c.feemonth)
    .map(c=>({...c,fd:getFeeCountdown(c)}))
    .filter(c=>c.fd<=92)
    .sort((a,b)=>a.fd-b.fd);

  if(!rows.length) return '<div class="alert-item" style="padding:10px 0"><div style="color:var(--text3);font-size:12px">No fees due in next 3 months ✅</div></div>';

  return rows.map(c=>{
    const isNextMonth = c.fd<=31;
    const isTwoMonths = c.fd<=62 && c.fd>31;
    const iconCls = isNextMonth?'ai-danger':isTwoMonths?'ai-warn':'ai-info';
    const icon = isNextMonth?'⚠️':isTwoMonths?'📅':'💳';
    const monthColor = isNextMonth?'var(--red)':isTwoMonths?'var(--orange)':'var(--text3)';
    return `
    <div class="alert-item">
      <div class="alert-icon ${iconCls}">${icon}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div class="alert-title">
            <span style="font-size:11px;color:var(--text3)">${c.bank} ·</span> <strong>${c.name}</strong>
          </div>
          <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${monthColor};white-space:nowrap">${c.feemonth}</span>
        </div>
        <div class="alert-sub" style="color:${monthColor}">${isNextMonth?'⚡ Due next month':isTwoMonths?'Due in ~2 months':'Due in ~3 months'} · <span style="font-family:var(--mono)">${c.fd}d away</span></div>
      </div>
    </div>`;
  }).join('');
}

function buildMilesBreakdown(pi){
  const cards=cardsFor(pi);
  const CONVERTED_BANKS=['KrisFlyer','Max Miles'];
  const pointCards=cards.filter(c=>!CONVERTED_BANKS.includes(c.bank)&&!c.isKF);
  const convertedCards=cards.filter(c=>(CONVERTED_BANKS.includes(c.bank)||c.isKF)&&c.points>0);
  const grandTotal=cards.filter(c=>!CONVERTED_BANKS.includes(c.bank)&&!c.isKF).reduce((s,c)=>s+getMiles(c),0)
    + convertedCards.reduce((s,c)=>s+c.points,0);

  if(!pointCards.length&&!convertedCards.length) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">No points yet.</div>';

  // Group all point cards by bank
  const byBank={};
  pointCards.forEach(c=>{ (byBank[c.bank]=byBank[c.bank]||[]).push(c); });

  // Sort banks by total miles desc
  const sortedBanks=Object.entries(byBank).sort((a,b)=>{
    const ma=a[1].reduce((s,c)=>s+getMiles(c),0);
    const mb=b[1].reduce((s,c)=>s+getMiles(c),0);
    return mb-ma;
  });

  let html='';
  sortedBanks.forEach(([bank, bankCards])=>{
    const bankMiles=bankCards.reduce((s,c)=>s+getMiles(c),0);
    const pct=grandTotal>0?(bankMiles/grandTotal*100).toFixed(1):0;
    const hasMultiple=bankCards.length>1;

    // Check if this bank has a pool
    const poolGroups={};
    const unpooled=[];
    bankCards.forEach(c=>{
      if(c.pool) (poolGroups[c.pool]=poolGroups[c.pool]||[]).push(c);
      else unpooled.push(c);
    });
    const isPooled=Object.keys(poolGroups).length>0;

    html+=`<div style="margin-bottom:14px">
      <!-- Bank header row -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:6px">
        <span style="font-size:11px;font-weight:600;color:var(--text2)">
          <span class="badge ${bankPillClass(bank)}" style="font-size:10px;padding:1px 7px;margin-right:5px">${bank}</span>${isPooled?'<span style="font-size:10px;color:var(--text3)">pooled</span>':''}
        </span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--accent2);font-weight:700;flex-shrink:0">${bankMiles.toLocaleString()}</span>
      </div>
      <div class="prog" style="margin-bottom:7px"><div class="prog-bar" style="width:${pct}%;background:var(--accent)"></div></div>
      <!-- Card sub-rows -->
      ${bankCards.sort((a,b)=>getMiles(b)-getMiles(a)).map(c=>{
        const m=getMiles(c), cpct=grandTotal>0?(m/grandTotal*100).toFixed(1):0;
        return `<div style="margin-bottom:5px;padding-left:10px;border-left:2px solid var(--border2)">
          <div style="display:flex;justify-content:space-between;gap:6px;margin-bottom:2px">
            <span style="font-size:11px;color:var(--text3)">${c.name}</span>
            <span style="display:flex;gap:5px;align-items:center;flex-shrink:0">
              ${ratioBadge(c.ratio)}
              ${!isPooled ? `<span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${m.toLocaleString()}</span>` : ''}
            </span>
          </div>
          ${!isPooled ? `<div class="prog" style="height:3px"><div class="prog-bar" style="width:${cpct}%;background:var(--accent2);opacity:.5"></div></div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  });

  // Converted & ready
  const convertedRows=convertedCards.map(c=>{
    const pct=grandTotal>0?(c.points/grandTotal*100).toFixed(1):0;
    const isKF=c.bank==='KrisFlyer'||c.isKF;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px;gap:6px">
        <span style="font-size:11px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <span class="badge ${isKF?'bp-krisflyer':'bp-amex'}" style="font-size:10px;padding:1px 6px">${c.bank}</span>
          <span style="color:var(--text2);margin-left:4px">${c.name}</span>
        </span>
        <span style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:10px;color:var(--text3)">ready</span>
          <span style="font-family:var(--mono);font-size:12px;color:${isKF?'var(--accent2)':'var(--green)'};font-weight:700">${c.points.toLocaleString()}</span>
        </span>
      </div>
      <div class="prog"><div class="prog-bar" style="width:${pct}%;background:${isKF?'var(--accent)':'var(--green)'}"></div></div>
    </div>`;
  }).join('');

  return html + (convertedCards.length ? `
    <div style="border-top:1px dashed var(--border);margin:10px 0 8px;display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap">✈ Converted & Ready</span>
    </div>
    ${convertedRows}` : '');
}

function buildBankGroup(pi, bank, search, statusFilter){
  const bankCards=allCards.filter(c=>
    c.owner===pi && c.bank===bank &&
    (!statusFilter||c.status===statusFilter) &&
    (!search||c.name.toLowerCase().includes(search)||c.bank.toLowerCase().includes(search))
  );
  const isPinned=BANK_ORDER.includes(bank);
  if(!bankCards.length && !isPinned) return '';
  if(!bankCards.length && isPinned && search) return '';

  const poolMap={};
  const unpooled=[];
  bankCards.forEach(c=>{
    if(c.pool) { (poolMap[c.pool]=poolMap[c.pool]||[]).push(c); }
    else unpooled.push(c);
  });

  const activeCards=bankCards.filter(c=>c.status==='active');
  const totalBankMiles=activeCards.reduce((s,c)=>s+getMiles(c),0);
  const totalBankPts=activeCards.reduce((s,c)=>s+c.points,0);
  const hasExpiring=activeCards.some(c=>{const d=getExpiryDays(c);return d!==null&&d<=90&&d>=0;});
  const feesSoon=activeCards.filter(c=>{const d=getFeeCountdown(c);return d!==null&&d<=30;});
  const colKey=`${pi}-${bank}`;
  const isOpen=!collapsed[colKey];

  let rowsHtml='';

  Object.entries(poolMap).forEach(([poolName, poolCards])=>{
    const poolMiles=poolCards.filter(c=>c.status==='active').reduce((s,c)=>s+getMiles(c),0);
    const poolPts=poolCards.filter(c=>c.status==='active').reduce((s,c)=>s+c.points,0);
    rowsHtml+=`<tr class="pool-row">
      <td colspan="2"><span class="pool-label">⬡ ${poolName}</span> <span style="color:var(--text3);font-size:11px">(pooled · ${poolCards.length} cards)</span></td>
      <td class="mono" style="color:var(--gold2);font-weight:600">${poolPts.toLocaleString()}</td>
      <td></td>
      <td class="mono" style="color:var(--accent2);font-weight:700">${poolMiles.toLocaleString()} mi</td>
      <td colspan="3"></td>
    </tr>`;
    poolCards.forEach(c=>{ rowsHtml+=buildCardRow(c, true); });
  });

  unpooled.forEach(c=>{ rowsHtml+=buildCardRow(c, false); });

  if(!bankCards.length){
    rowsHtml=`<tr><td colspan="8"><div class="empty" style="padding:16px">No ${bank} cards yet.</div></td></tr>`;
  }

  return `
  <div class="bank-group">
    <div class="bank-header ${isOpen?'':'closed'}" onclick="toggleGroup('${colKey}')">
      <div class="bank-header-left">
        <span class="bank-pill ${bankPillClass(bank)}">${bank}</span>
        <span style="font-size:12px;color:var(--text2)">${bankCards.length} card${bankCards.length!==1?'s':''}</span>
        ${hasExpiring?'<span class="badge b-red" style="font-size:10px">⚠ expiring</span>':''}
        ${feesSoon.length?`<span class="badge b-orange" style="font-size:10px">📅 fee due</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="bank-summary">
          <div class="bank-stat">
            <div class="bank-stat-val" style="color:var(--text3);font-size:11px">${totalBankPts.toLocaleString()} pts</div>
            <div class="bank-stat-lbl">Balance</div>
          </div>
          <div class="bank-stat">
            <div class="bank-stat-val" style="color:var(--accent2)">${totalBankMiles.toLocaleString()}</div>
            <div class="bank-stat-lbl">Est. Miles</div>
          </div>
        </div>
        <span class="chevron ${isOpen?'open':''}">▼</span>
      </div>
    </div>
    ${isOpen?`
    <div class="bank-body">
      <table>
        <thead><tr>
          <th style="width:28%">Card</th>
          <th>Points</th>
          <th>Ratio</th>
          <th>Est. Miles</th>
          <th>Expiry</th>
          <th>Fee Month</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="bank-add-row">
        <button class="btn btn-ghost btn-sm" onclick="openAddCardForBank('${bank}',${pi})">+ Add ${bank} card for ${persons[pi]}</button>
      </div>
    </div>`:''}
  </div>`;
}

function buildCardRow(c, indented){
  const miles=getMiles(c);
  const d=getExpiryDays(c);
  const expiryHtml=c.expiry
    ? `<span class="badge ${d<=30?'b-red':d<=90?'b-orange':d<=180?'b-gold':'b-gray'}">${c.expiry}<span style="opacity:.6;font-size:10px"> ${d}d</span></span>`
    : '<span style="color:var(--text3)">—</span>';

  return `<tr class="card-row">
    <td>
      <div class="${indented?'card-indent':''}">
        <div>
          <div style="font-weight:500">${c.name}</div>
          ${c.validity?`<div style="font-size:10px;color:var(--text3)">⏱ ${c.validity}</div>`:''}
          ${c.pool?`<div style="font-size:10px;color:var(--text3)">⬡ ${c.pool}</div>`:''}
          ${c.notes?`<div style="font-size:10px;color:var(--text3);font-style:italic">${c.notes}</div>`:''}

    <td><input class="inline-edit" type="number" value="${c.points}" onchange="quickUpdatePoints('${c.id}',this.value)"></td>
    <td>${ratioBadge(c.ratio)}</td>
    <td class="mono" style="color:var(--accent2);font-weight:600">${miles.toLocaleString()}</td>
    <td>${expiryHtml}</td>
    <td>${feeCountdownHtml(c)}</td>
    <td>
      <div style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-sm" onclick="openEditCard('${c.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCard('${c.id}')">Del</button>

function previewChange(id, old, val){
  const el=document.getElementById(`chg-${id}`);
  if(!el) return;
  const nv=parseInt(val);
  if(isNaN(nv)){ el.textContent='—'; el.style.color='var(--text3)'; return; }
  const diff=nv-old;
  el.textContent=(diff>=0?'+':'')+diff.toLocaleString();
  el.style.color=diff>0?'var(--green)':diff<0?'var(--red)':'var(--text3)';
}

async function saveAllUpdates(){
  const month=document.getElementById('update-month').value;
  if(!month){ alert('Select a month first.'); return; }
  let n=0;
  const newHistoryRows=[];
  allCards.filter(c=>c.status==='active').forEach(c=>{
    const inp=document.getElementById(`upd-${c.id}`);
    const note=document.getElementById(`note-${c.id}`)?.value||'';
    if(inp&&inp.value!==''){
      const nv=parseInt(inp.value);
      if(!isNaN(nv)){
        const entry={month,owner:c.owner,cardId:c.id,cardName:c.name,bank:c.bank,balance:nv,prev:c.points,change:nv-c.points,note};
        allHistory.unshift(entry);
        newHistoryRows.push({
          month, owner:c.owner, card_id:c.id, card_name:c.name,
          bank:c.bank, balance:nv, prev:c.points, change:nv-c.points, note:note||null
        });
        c.points=nv; c.lastUpdated=month; n++;
      }
    }
  });
  if(!n){ alert('No values entered.'); return; }
  await saveCards();
  try { await sb.from('history').insert(newHistoryRows); } catch(e){ console.error('history insert error',e); }
  renderMain();
  alert(`✅ Updated ${n} card${n!==1?'s':''} for ${month}`);
}

function renderHistoryTable(){
  const f=document.getElementById('hf-person')?.value;
  const rows=(f===undefined||f==='all'?allHistory:allHistory.filter(h=>h.owner===parseInt(f)))
    .slice().reverse().slice(0,80);
  const tbody=document.getElementById('history-tbody');
  if(!tbody) return;
  tbody.innerHTML=rows.length
    ? rows.map(h=>`<tr>
        <td class="mono">${h.month}</td>
        <td style="color:${personColor(h.owner)}">${persons[h.owner]||h.owner}</td>
        <td><span class="badge ${bankPillClass(h.bank)}" style="font-size:10px">${h.bank}</span></td>
        <td>${h.cardName}</td>
        <td class="mono">${h.balance.toLocaleString()}</td>
        <td class="mono" style="color:${h.change>0?'var(--green)':h.change<0?'var(--red)':'var(--text3)'}">

      </tr>`).join('')

}

function buildExpiryBatchSection(){

  // Stats
  const now=new Date();
  const in90=new Date(now); in90.setDate(in90.getDate()+90);
  const in180=new Date(now); in180.setDate(in180.getDate()+180);
  const in365=new Date(now); in365.setDate(in365.getDate()+365);

  const filtered=allBatches.filter(b=>filterOwner==='all'||b.owner===filterOwner);
  const exp90=filtered.filter(b=>new Date(b.expiryDate)<=in90);
  const exp180=filtered.filter(b=>new Date(b.expiryDate)<=in180&&new Date(b.expiryDate)>in90);
  const exp365=filtered.filter(b=>new Date(b.expiryDate)<=in365&&new Date(b.expiryDate)>in180);
  const totalExpiringPts=filtered.reduce((s,b)=>s+b.points,0);
  const totalExpiringMiles=filtered.reduce((s,b)=>{
    const card=allCards.find(c=>c.id===b.cardId);
    const ratio=card?card.ratio:1;
    return s+Math.floor(b.points*ratio);
  },0);

  // Group by year-month for timeline
  const byMonth={};
  filtered.forEach(b=>{
    const key=b.expiryDate.slice(0,7); // YYYY-MM
    (byMonth[key]=byMonth[key]||[]).push(b);
  });
  const sortedMonths=Object.keys(byMonth).sort();

  wrap.innerHTML=`
    <div style="max-width:1100px">
      <!-- HEADER + ADD BUTTON -->
      <div class="section-header" style="margin-bottom:18px">
        <div class="section-title"><span class="dot" style="background:var(--red)"></span>Points Expiry Tracker</div>
        <button class="btn btn-primary btn-sm" onclick="openAddBatchModal()">+ Add Expiry Batch</button>
      </div>

      <!-- STAT CARDS -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px">
        <div class="stat-card red">
          <div class="stat-label">Expiring ≤ 90 days</div>
          <div class="stat-value red" style="font-size:22px">${exp90.reduce((s,b)=>s+b.points,0).toLocaleString()}</div>

  return wrap;
}

async function deleteBatch(id){
  if(!confirm('Remove this expiry batch?')) return;
  allBatches=allBatches.filter(b=>b.id!==id);
  await deleteBatchFromDB(id);
  renderMain();
}

async function saveBatchEntry(){
  const sel=document.getElementById('b-card');
  const opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.value){ alert('Select a card.'); return; }
  const pts=parseInt(document.getElementById('b-points').value);
  const expiry=document.getElementById('b-expiry').value;
  if(!pts||pts<=0){ alert('Enter a valid points amount.'); return; }
  if(!expiry){ alert('Select an expiry month.'); return; }
  // Convert YYYY-MM to last day of that month for expiry_date
  const [yr,mo]=expiry.split('-');
  const expiryDate=new Date(parseInt(yr),parseInt(mo),0); // last day of month
  const expiryDateStr=expiryDate.toISOString().split('T')[0];

  const batch={
    cardId:   opt.value,
    owner:    parseInt(opt.dataset.owner),
    bank:     opt.dataset.bank,
    cardName: opt.dataset.name,
    points:   pts,
    expiryMonth: expiry,
    expiryDate:  expiryDateStr,
    notes:    document.getElementById('b-notes').value,
  };
  await saveBatch(batch);
  // Reload from DB to get the auto-generated id
  const {data}=await sb.from('point_batches').select('*').order('expiry_date');
  if(data) allBatches=data.map(r=>({
    id:r.id, cardId:r.card_id, owner:r.owner, bank:r.bank,
    cardName:r.card_name, points:r.points, expiryMonth:r.expiry_month,
    expiryDate:r.expiry_date, notes:r.notes||'',
  }));
  closeBatchModal();
  renderMain();
}

function getSoonestBatchExpiry(cardIds){
  // Returns the soonest expiry date string across all batches for given card IDs
  const batches=allBatches.filter(b=>cardIds.includes(b.cardId)&&b.points>0);
  if(!batches.length) return '';
  return batches.map(b=>b.expiryDate).sort()[0];
}

function getBatchExpiringPoints(cardIds, withinDays=90){
  // Returns total points in batches expiring within N days for given card IDs
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()+withinDays);
  return allBatches
    .filter(b=>cardIds.includes(b.cardId)&&new Date(b.expiryDate)<=cutoff&&b.points>0)
    .reduce((s,b)=>s+b.points,0);
}

function getMilesNeeded(zoneId, cabin, awardType, pax, tripType){
  const zone=AWARD_CHART.zones.find(z=>z.id===zoneId);
  if(!zone) return 0;
  const key = cabin==='economy'
    ? (awardType==='saver'?'ecoSaver':'ecoAdv')
    : cabin==='business'
    ? (awardType==='saver'?'bizSaver':'bizAdv')
    : cabin==='first'
    ? 'firstSaver'
    : 'ecoSaver';
  const oneway = (zone[key]||0) * pax;
  return tripType==='return' ? oneway*2 : oneway;
}

// Get transfer sources for a person (or both), grouped sensibly
function getTransferSources(owners){
  const CONVERTED=['KrisFlyer','Max Miles'];
  const sources=[];

  // KrisFlyer balances first (ready to use, no fee)
  owners.forEach(pi=>{
    allCards.filter(c=>c.owner===pi&&c.status==='active'&&(c.bank==='KrisFlyer'||c.isKF)&&c.points>0).forEach(c=>{
      sources.push({key:'KrisFlyer',label:`${persons[pi]} · KrisFlyer Account`,owner:pi,points:c.points,milesAvail:c.points,fee:0,minPts:0,time:'Ready',freeConvert:true,expiry:c.expiry,cardId:c.id});
    });
  });

  // Max Miles (free, instant)
  owners.forEach(pi=>{
    allCards.filter(c=>c.owner===pi&&c.status==='active'&&c.bank==='Max Miles'&&c.points>0).forEach(c=>{
      sources.push({key:'Max Miles',label:`${persons[pi]} · Max Miles`,owner:pi,points:c.points,milesAvail:c.points,fee:0,minPts:1000,time:'Instant',freeConvert:true,expiry:c.expiry,cardId:c.id});
    });
  });

  // DBS pool per person
  owners.forEach(pi=>{
    const dbs=allCards.filter(c=>c.owner===pi&&c.status==='active'&&c.bank==='DBS'&&!CONVERTED.includes(c.bank));
    if(dbs.length){
      const totalPts=dbs.reduce((s,c)=>s+c.points,0);
      const meta=TRANSFER_META['DBS'];
      const blocks=Math.floor(totalPts/meta.minPts);
      const milesAvail=blocks*(meta.minPts/meta.ptsPerMile);
      const expiry=getSoonestBatchExpiry(dbs.map(c=>c.id)) || dbs.map(c=>c.expiry).filter(Boolean).sort()[0]||'';

      const meta=TRANSFER_META['HSBC'];

      const expiry=getSoonestBatchExpiry([c.id])||c.expiry||'';
      const expiringPts=getBatchExpiringPoints([c.id]);
      if(blocks>0) sources.push({key:'OCBC-Rewards',label:`${persons[pi]} · OCBC Rewards ($)`,owner:pi,points:c.points,milesAvail,fee:meta.fee,minPts:meta.minPts,minMiles:meta.minPts/meta.ptsPerMile,time:meta.time,freeConvert:false,expiry,expiringPts,cards:c.name});
    });
  });

  return sources;
}

// Optimise sources with correct priority:
// 1. KrisFlyer balance (ready, free)
// 2. Expiring soonest (waste prevention beats fee saving)
// 3. Max Miles (free, instant)
// 4. HSBC (free conversion)
// 5. Remaining paid sources sorted by fee/milesAvail (cheapest $ per available mile from that source)
// 6. OCBC 90N last (worst value — S$25 for potentially very few miles)
function optimiseSources(sources, milesNeeded){
  let remaining=milesNeeded;
  const plan=[];

  // Bucket 1: KrisFlyer (already converted, free)
  const kf=sources.filter(s=>s.key==='KrisFlyer');

  // Bucket 2: Sources with batch points expiring within 90 days — sorted by soonest expiry
  const expiring=sources
    .filter(s=>s.key!=='KrisFlyer' && s.expiry && getExpiryDaysRaw(s.expiry)<=90 && (s.expiringPts>0||getExpiryDaysRaw(s.expiry)<=90))
    .sort((a,b)=>getExpiryDaysRaw(a.expiry)-getExpiryDaysRaw(b.expiry));

  // Bucket 3: Max Miles (free, instant)
  const maxMiles=sources.filter(s=>s.key==='Max Miles');

  // Bucket 4: HSBC (free conversion, but large min block)
  const hsbc=sources.filter(s=>s.key==='HSBC');

  // Bucket 5: Remaining paid sources — sort by fee ÷ milesAvail (cheapest $ per available mile)
  // Lower = better value per session
  const usedKeys=new Set([...kf,...expiring,...maxMiles,...hsbc].map(s=>s.label));
  const paid=sources
    .filter(s=>!usedKeys.has(s.label) && s.key!=='OCBC-90N' && s.milesAvail>0)
    .sort((a,b)=>{
      const ratioA = a.milesAvail>0 ? a.fee/a.milesAvail : 999;
      const ratioB = b.milesAvail>0 ? b.fee/b.milesAvail : 999;
      return ratioA-ratioB;
    });

  // Bucket 6: OCBC 90N last (flat S$25 for potentially small blocks)
  const ocbc90n=sources.filter(s=>s.key==='OCBC-90N' && !usedKeys.has(s.label));

  const ordered=[...kf,...expiring,...maxMiles,...hsbc,...paid,...ocbc90n];

  for(const src of ordered){
    if(remaining<=0) break;
    if(src.milesAvail<=0) continue;
    const minMiles=src.minMiles||1;
    // How many miles do we need from this source (don't over-convert)
    const milesWanted=Math.min(src.milesAvail, remaining);
    // Round up to nearest block
    const blocks=Math.ceil(milesWanted/minMiles);
    const milesFromThis=Math.min(blocks*minMiles, src.milesAvail);
    // Points to convert = blocks × minPts (one session, flat fee)
    const ptsToConvert=Math.min(blocks*src.minPts, src.points);
    plan.push({
      ...src,
      useBlocks:blocks,
      milesFromThis,
      ptsToConvert,
      actualMiles:milesFromThis,
      priorityReason: src.key==='KrisFlyer'?'Already converted'
        : src.expiry&&getExpiryDaysRaw(src.expiry)<=90?`⚠ Expiring in ${getExpiryDaysRaw(src.expiry)}d`
        : src.key==='Max Miles'?'Free · Instant'
        : src.key==='HSBC'?'Free conversion'
        : src.key==='OCBC-90N'?'Last resort'
        : `S$${src.fee} flat fee`,
    });
    remaining-=milesFromThis;
  }

  return {plan, shortfall:Math.max(0,Math.ceil(remaining))};
}

function calcSQBookingDate(){
  const val=document.getElementById('sq-travel-date')?.value;
  const el=document.getElementById('sq-booking-result');
  if(!el) return;
  if(!val){ el.innerHTML='<span style="color:var(--text3)">← enter a date</span>'; return; }

  const travel=new Date(val);
  const today=new Date(); today.setHours(0,0,0,0);
  const bookingOpen=new Date(travel); bookingOpen.setDate(bookingOpen.getDate()-355);
  const daysUntilOpen=Math.ceil((bookingOpen-today)/86400000);
  const fmt=d=>d.toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});

  if(daysUntilOpen<=0){
    // Already open
    const daysLeft=Math.ceil((travel-today)/86400000);
    el.innerHTML=`<span style="color:var(--green);font-weight:700">✅ Window open now!</span>
      <span style="font-size:11px;color:var(--text3);margin-left:6px">Travel in ${daysLeft}d · Book immediately on singaporeair.com</span>`;
  } else {
    // Not open yet
    const urgency=daysUntilOpen<=30?'var(--orange)':daysUntilOpen<=90?'var(--gold2)':'var(--accent2)';
    el.innerHTML=`<span style="font-family:var(--mono);font-weight:700;color:${urgency}">${fmt(bookingOpen)}</span>
      <span style="font-size:11px;color:var(--text3);margin-left:6px">opens in ${daysUntilOpen}d</span>`;
  }
}

function getExpiryDaysRaw(expiry){
  if(!expiry) return 9999;
  return Math.ceil((new Date(expiry)-new Date())/86400000);
}

function runRedemptionPlan(){
  const whoVal=document.getElementById('plan-who').value;
  const zoneId=parseInt(document.getElementById('plan-zone').value);
  const tripType=document.getElementById('plan-trip').value;
  const cabin=document.getElementById('plan-cabin').value;
  const awardType=document.getElementById('plan-award').value;
  const pax=parseInt(document.getElementById('plan-pax').value);

  if(!zoneId){ alert('Please select a destination.'); return; }

  const zone=AWARD_CHART.zones.find(z=>z.id===zoneId);
  const cabinLabel={'economy':'Economy','business':'Business Class','first':'First Class / Suites'}[cabin];
  const awardLabel=awardType==='saver'?'Saver':'Advantage';
  const tripLabel=tripType==='return'?'Return':'One-way';
  const el=document.getElementById('plan-results');

  // Single person — straightforward
  if(whoVal!=='all'){
    const pi=parseInt(whoVal);
    const milesNeeded=getMilesNeeded(zoneId,cabin,awardType,pax,tripType);
    const sources=getTransferSources([pi]);
    const {plan,shortfall}=optimiseSources(sources,milesNeeded);
    const totalFees=plan.filter(p=>!p.freeConvert).reduce((s,p)=>s+p.fee,0);
    const totalAvailMiles=sources.reduce((s,x)=>s+x.milesAvail,0);
    const canCover=shortfall<=0;
    el.innerHTML=renderScenario({
      title:`${persons[pi]}'s booking`,
      subtitle:`${pax} pax · ${cabinLabel} · ${awardLabel} · ${tripLabel} · ${zone.label}`,
      milesNeeded, totalAvailMiles, shortfall, canCover,
      plan, sources, totalFees, zone, cabinLabel, awardLabel, pax, tripType
    });
    return;
  }

  // Both — show 3 scenarios
  const milesFor2=getMilesNeeded(zoneId,cabin,awardType,2,tripType);
  const milesFor1=getMilesNeeded(zoneId,cabin,awardType,1,tripType);

  const scenarios=persons.map((p,pi)=>{
    // Scenario A: this person books for BOTH
    const sourcesAll=getTransferSources([pi]);
    const planAll=optimiseSources(sourcesAll,milesFor2);
    const feesAll=planAll.plan.filter(p=>!p.freeConvert).reduce((s,p)=>s+p.fee,0);
    const availAll=sourcesAll.reduce((s,x)=>s+x.milesAvail,0);
    return {
      pi, name:p,
      milesNeeded:milesFor2,
      sources:sourcesAll,
      plan:planAll.plan,
      shortfall:planAll.shortfall,
      canCover:planAll.shortfall<=0,
      totalFees:feesAll,
      totalAvailMiles:availAll,
    };
  });

  // Scenario C: each books own 1 ticket
  const splitScenario=persons.map((p,pi)=>{
    const src=getTransferSources([pi]);
    const result=optimiseSources(src,milesFor1);
    return {
      pi, name:p,
      plan:result.plan,
      shortfall:result.shortfall,
      canCover:result.shortfall<=0,
      totalFees:result.plan.filter(p=>!p.freeConvert).reduce((s,p)=>s+p.fee,0),
      sources:src,
    };
  });
  const splitCanCover=splitScenario.every(s=>s.canCover);
  const splitTotalFees=splitScenario.reduce((s,x)=>s+x.totalFees,0);

  el.innerHTML=`
    <!-- SCENARIO COMPARISON -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px">
      <div class="section-title" style="margin-bottom:14px"><span class="dot" style="background:var(--gold)"></span>Which booking scenario works best?</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">

        ${scenarios.map(s=>`
          <div style="background:var(--surface2);border:1px solid ${s.canCover?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};border-radius:10px;padding:14px">
            <div style="font-size:11px;font-weight:700;color:${personColor(s.pi)};text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${s.name} books both tickets</div>
            <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${s.canCover?'var(--green)':'var(--red)'};">${s.canCover?'✅ Can cover':'⚠ Short'}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:4px">Needs ${milesFor2.toLocaleString()} miles</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Has ${s.totalAvailMiles.toLocaleString()} avail</div>
            ${!s.canCover?`<div style="font-size:11px;color:var(--red);margin-top:2px">Short ${s.shortfall.toLocaleString()} miles</div>`:''}
            <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
              <span style="font-size:11px;color:var(--text3)">Conversion fees: </span>
              <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${s.totalFees>0?'var(--gold2)':'var(--green)'}">${s.totalFees>0?'S$'+s.totalFees.toFixed(2):'Free'}</span>
            </div>
          </div>`).join('')}

        <div style="background:var(--surface2);border:1px solid ${splitCanCover?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};border-radius:10px;padding:14px;grid-column:1/-1">
          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Each person books their own ticket (recommended if both have enough)</div>
          <div style="display:flex;gap:20px;flex-wrap:wrap">
            ${splitScenario.map(s=>`
              <div>
                <span style="color:${personColor(s.pi)};font-weight:600">${s.name}:</span>
                <span style="font-family:var(--mono);font-size:13px;color:${s.canCover?'var(--green)':'var(--red)'}"> ${s.canCover?'✅':'⚠'} ${milesFor1.toLocaleString()} miles needed</span>
                <span style="font-size:11px;color:var(--text3)"> · fees: ${s.totalFees>0?'S$'+s.totalFees.toFixed(2):'Free'}</span>
              </div>`).join('')}
            <div style="margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700;color:${splitTotalFees>0?'var(--gold2)':'var(--green)'}">
              Total fees: ${splitTotalFees>0?'S$'+splitTotalFees.toFixed(2):'Free'}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DETAILED PLAN PER SCENARIO -->
    ${scenarios.map(s=>`
      <div style="margin-bottom:24px">
        <div class="section-header" style="margin-bottom:12px">
          <div class="section-title">
            <span class="dot" style="background:${personColor(s.pi)}"></span>
            ${s.name} books both — detailed plan
          </div>
          <span class="badge ${s.canCover?'b-green':'b-red'}">${s.canCover?'Feasible':'Not enough miles'}</span>
        </div>
        ${renderPlanTable(s.plan, s.shortfall, s.canCover)}
      </div>`).join('')}

    <div style="margin-bottom:24px">
      <div class="section-header" style="margin-bottom:12px">
        <div class="section-title"><span class="dot" style="background:var(--text2)"></span>Each books own — detailed plan</div>
        <span class="badge ${splitCanCover?'b-green':'b-red'}">${splitCanCover?'Both feasible':'One or both short'}</span>
      </div>
      ${splitScenario.map(s=>`
        <div style="margin-bottom:14px">
          <div style="font-size:12px;font-weight:700;color:${personColor(s.pi)};margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${s.name} · 1 ticket · ${milesFor1.toLocaleString()} miles needed</div>
          ${renderPlanTable(s.plan, s.shortfall, s.canCover)}
        </div>`).join('')}
    </div>
  `;
}

  document.getElementById('f-notes').value=c.notes||'';
  populateOwnerSelect(c.owner);
  document.getElementById('card-modal').classList.add('open');
}

function closeModal(){ document.getElementById('card-modal').classList.remove('open'); }

async function saveCard(){
  const name=document.getElementById('f-name').value.trim();
  const bank=document.getElementById('f-bank').value.trim();
  if(!name||!bank){ alert('Card name and bank are required.'); return; }
  const card={
    id: editingId||uid(),
    owner: parseInt(document.getElementById('f-owner').value),
    bank, name,
    points: parseInt(document.getElementById('f-points').value)||0,
    ratio: parseFloat(document.getElementById('f-ratio').value)||1,
    pool: document.getElementById('f-pool').value.trim(),
    validity: document.getElementById('f-validity').value,
    expiry: document.getElementById('f-expiry').value,
    feemonth: document.getElementById('f-feemonth').value,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value,
    lastUpdated: editingId ? allCards.find(c=>c.id===editingId)?.lastUpdated||'' : '',
  };
  if(editingId){ const idx=allCards.findIndex(c=>c.id===editingId); allCards[idx]=card; }
  else allCards.push(card);
  await saveCards();
  closeModal();
  renderMain();
}

async function deleteCard(id){
  const c=allCards.find(c=>c.id===id);
  if(!confirm(`Delete "${c?.name}"?`)) return;
  allCards=allCards.filter(c=>c.id!==id);
  await deleteCardFromDB(id);
  renderMain();
}

function quickUpdatePoints(id,val){
  const c=allCards.find(c=>c.id===id); if(!c) return;
  c.points=parseInt(val)||0;
  c.lastUpdated=new Date().toISOString().split('T')[0];
  saveCards();
  if(activeTab==='overview') renderMain();
}

function toggleExportMenu(){
  const m=document.getElementById('export-menu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#export-menu')&&!e.target.textContent.includes('Export'))
    { const m=document.getElementById('export-menu'); if(m) m.style.display='none'; }
});

/* ═══════════════════════════════
   EXPORT
═══════════════════════════════ */
function exportData(){
  const rows=[
    ['Person','Bank','Card','Points','Ratio (pts/mile)','Est Miles','Pool','Expiry','Fee Month','Status','Notes'],
    ...allCards.map(c=>[persons[c.owner],c.bank,c.name,c.points,c.ratio,getMiles(c),c.pool||'',c.expiry||'',c.feemonth||'',c.status,c.notes||''])
  ];
  downloadCSV(rows, `krisflyer-cards-${new Date().toISOString().slice(0,10)}.csv`);
}

async function exportHistory(){
  // Fetch full history from Supabase (not just the 200 loaded in memory)
  let rows=[['Month','Person','Bank','Card','Balance','Change','Notes']];
  try {
    const {data}=await sb.from('history').select('*').order('month',{ascending:true}).order('created_at',{ascending:true});
    if(data&&data.length){
      rows=[...rows,...data.map(h=>[
        h.month, persons[h.owner]||h.owner, h.bank, h.card_name,
        h.balance, h.change>=0?'+'+h.change:h.change, h.note||''
      ])];
    }
  } catch(e){ alert('Could not fetch full history from database.'); return; }
  downloadCSV(rows, `krisflyer-history-${new Date().toISOString().slice(0,10)}.csv`);
}

function downloadCSV(rows, filename){
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename;
  a.click();
}
